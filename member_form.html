{% extends 'base.html' %}
{% block title %}{{ action }} Member – Library MS{% endblock %}
{% block page_title %}{{ action }} Member{% endblock %}

{% block content %}
<div style="max-width:600px">
  <a href="{{ url_for('members') }}" class="btn btn-sm" style="border:1px solid var(--border);color:var(--muted);margin-bottom:20px">
    <i class="fas fa-arrow-left"></i> Back to Members
  </a>
  <div class="card">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name *</label>
          <input type="text" name="name" value="{{ member.name if member else '' }}" required
                 placeholder="e.g. Aarav Sharma">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" value="{{ member.email if member else '' }}"
                 placeholder="e.g. aarav@example.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" value="{{ member.phone if member else '' }}"
                 placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
          <label>Member Type</label>
          <select name="member_type">
            {% for t in ['Student','Faculty','Staff','External'] %}
              <option value="{{ t }}" {{ 'selected' if member and member.member_type == t }}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        {% if member %}
        <div class="form-group">
          <label>Status</label>
          <select name="active">
            <option value="1" {{ 'selected' if member.active == 1 }}>Active</option>
            <option value="0" {{ 'selected' if member.active == 0 }}>Inactive</option>
          </select>
        </div>
        {% endif %}
        <div class="form-group full">
          <label>Address</label>
          <textarea name="address" rows="2" placeholder="City, State">{{ member.address if member else '' }}</textarea>
        </div>
      </div>
      <div style="margin-top:24px;display:flex;gap:10px">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-floppy-disk"></i> {{ action }} Member
        </button>
        <a href="{{ url_for('members') }}" class="btn" style="border:1px solid var(--border);color:var(--muted)">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
