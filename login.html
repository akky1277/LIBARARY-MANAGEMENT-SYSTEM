<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Library MS</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1117;
      color: #e8ecf4;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    /* Decorative background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(212,168,67,.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(212,168,67,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .login-wrap {
      width: 380px;
      background: #181c27;
      border: 1px solid #2a3047;
      border-radius: 16px;
      padding: 44px 36px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }
    /* Gold accent line at top */
    .login-wrap::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 80px; height: 3px;
      background: linear-gradient(90deg, transparent, #d4a843, transparent);
      border-radius: 0 0 4px 4px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 64px; height: 64px; background: rgba(212,168,67,.12);
      border: 1px solid rgba(212,168,67,.25); border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin-bottom: 14px;
    }
    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: #d4a843;
    }
    .logo p { font-size: .8rem; color: #8892a4; margin-top: 4px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: .78rem; color: #8892a4; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: #8892a4; font-size: .85rem;
    }
    input {
      width: 100%; background: #0f1117; border: 1px solid #2a3047;
      border-radius: 8px; color: #e8ecf4; padding: 11px 14px 11px 38px;
      font-size: .88rem; font-family: inherit; outline: none; transition: border .2s;
    }
    input:focus { border-color: #d4a843; }

    .btn-login {
      width: 100%; padding: 12px; background: #d4a843; color: #0f1117;
      border: none; border-radius: 8px; font-size: .95rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .2s; margin-top: 8px;
    }
    .btn-login:hover { background: #f0c864; }

    .hint { text-align: center; margin-top: 20px; font-size: .76rem; color: #8892a4; }
    .hint code { background: rgba(212,168,67,.1); color: #d4a843;
                 padding: 1px 6px; border-radius: 4px; }

    .alert-danger {
      background: rgba(224,82,82,.1); color: #e05252; border: 1px solid rgba(224,82,82,.25);
      border-radius: 8px; padding: 10px 14px; font-size: .84rem; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <h1>Library MS</h1>
    <p>Admin Login Portal</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert-danger"><i class="fas fa-triangle-exclamation"></i> {{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="admin" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="fas fa-right-to-bracket"></i> Sign In
    </button>
  </form>

  <div class="hint">
    Demo credentials: <code>admin</code> / <code>admin123</code>
  </div>
</div>
</body>
</html>
